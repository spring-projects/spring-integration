description = 'Spring Integration External Dependencies BOM'

apply plugin: 'java-platform'
apply from: "${rootDir}/gradle/publish-maven.gradle"

javaPlatform {
	allowDependencies()
}

ext {
	apacheSshdVersion = '2.17.1'
	artemisVersion = '2.52.0'
	aspectjVersion = '1.9.25.1'
	assertjVersion = '3.27.7'
	assertkVersion = '0.28.1'
	avroVersion = '1.12.1'
	awaitilityVersion = '4.3.0'
	camelVersion = '4.18.1'
	cloudEventsVersion = '4.0.1'
	commonsDbcp2Version = '2.14.0'
	commonsIoVersion = '2.21.0'
	commonsNetVersion = '3.12.0'
	curatorVersion = '5.9.0'
	debeziumVersion = '3.4.3.Final'
	derbyVersion = '10.17.1.0'
	ftpServerVersion = '1.2.1'
	graalvmVersion = '25.0.2'
	greenmailVersion = '2.1.8'
	groovyVersion = '5.0.5'
	grpcVersion = '1.79.0'
	hamcrestVersion = '3.0'
	hazelcastVersion = '5.6.0'
	hibernateVersion = '7.3.0.Final'
	hsqldbVersion = '2.7.4'
	h2Version = '2.4.240'
	jacksonVersion = '2.21.2'
	jackson3Version = '3.1.1'
	jaxbVersion = '4.0.7'
	jcifsVersion = '3.0.2'
	jeroMqVersion = '0.6.0'
	jmsApiVersion = '3.1.0'
	jpaApiVersion = '3.2.0'
	jrubyVersion = '10.0.4.0'
	jsonpathVersion = '3.0.0'
	junitJupiterVersion = '6.0.3'
	junitPioneerVersion = '2.3.0'
	kotlinCoroutinesVersion = '1.10.2'
	kryoVersion = '5.6.2'
	lettuceVersion = '7.5.1.RELEASE'
	log4jVersion = '2.25.4'
	mailVersion = '2.0.5'
	micrometerTracingVersion = '1.7.0-M4'
	micrometerVersion = '1.17.0-M3'
	mockitoVersion = '5.23.0'
	mongoDriverVersion = '5.7.0-beta1'
	mysqlVersion = '9.6.0'
	oracleVersion = '23.26.1.0.0'
	pahoMqttClientVersion = '1.2.5'
	postgresVersion = '42.7.10'
	protobufVersion = '4.34.1'
	r2dbch2Version = '1.1.0.RELEASE'
	reactorVersion = '2025.0.4'
	resilience4jVersion = '2.4.0'
	romeToolsVersion = '2.1.0'
	rsocketVersion = '1.1.5'
	servletApiVersion = '6.1.0'
	smackVersion = '4.4.8'
	springAmqpVersion = '4.1.0-M3'
	springDataVersion = '2026.0.0-SNAPSHOT'
	springGraphqlVersion = '2.0.2'
	springKafkaVersion = '4.1.0-SNAPSHOT'
	springSecurityVersion = '7.1.0-M3'
	springVersion = '7.0.6'
	springWsVersion = '5.0.1'
	testcontainersVersion = '2.0.4'
	tomcatVersion = '11.0.21'
	xmlUnitVersion = '2.11.0'
	xstreamVersion = '1.4.21'
	ztZipVersion = '1.17'
}

dependencies {
	api platform("com.fasterxml.jackson:jackson-bom:$jacksonVersion")
	api platform("tools.jackson:jackson-bom:$jackson3Version")
	api platform("org.junit:junit-bom:$junitJupiterVersion")
	api platform("io.projectreactor:reactor-bom:$reactorVersion")
	api platform("com.fasterxml.jackson:jackson-bom:$jacksonVersion")
	api platform("tools.jackson:jackson-bom:$jackson3Version")
	api platform("org.junit:junit-bom:$junitJupiterVersion")
	api platform("org.springframework:spring-framework-bom:$springVersion")
	api platform("io.projectreactor:reactor-bom:$reactorVersion")
	api platform("org.apache.logging.log4j:log4j-bom:$log4jVersion")
	api platform("org.springframework.data:spring-data-bom:$springDataVersion")
	api platform("io.micrometer:micrometer-bom:$micrometerVersion")
	api platform("io.micrometer:micrometer-tracing-bom:$micrometerTracingVersion")
	api platform("org.testcontainers:testcontainers-bom:$testcontainersVersion")
	api platform("org.apache.camel:camel-bom:$camelVersion")
	api platform("org.apache.groovy:groovy-bom:$groovyVersion")
	api platform("org.jetbrains.kotlinx:kotlinx-coroutines-bom:$kotlinCoroutinesVersion")
	api platform("org.springframework.amqp:spring-amqp-bom:$springAmqpVersion")
	api platform("org.springframework.kafka:spring-kafka-bom:$springKafkaVersion")
	api platform("org.springframework.security:spring-security-bom:$springSecurityVersion")
	api platform("org.springframework.ws:spring-ws-bom:$springWsVersion")
	api platform("org.mongodb:mongodb-driver-bom:$mongoDriverVersion")
	api platform("io.grpc:grpc-bom:$grpcVersion")
	api platform("io.cloudevents:cloudevents-bom:$cloudEventsVersion")

	constraints {

		// spring-integration-core
		api "com.google.protobuf:protobuf-java:$protobufVersion"
		api "com.jayway.jsonpath:json-path:$jsonpathVersion"
		api "com.esotericsoftware:kryo:$kryoVersion"
		api "io.github.resilience4j:resilience4j-ratelimiter:$resilience4jVersion"
		api "org.apache.avro:avro:$avroVersion"
		api "org.jetbrains.kotlinx:kotlinx-coroutines-reactor:$kotlinCoroutinesVersion"

		// spring-integration-ftp
		api "org.apache.ftpserver:ftpserver-core:$ftpServerVersion"

		// spring-integration-http, spring-integration-websocket
		api "jakarta.servlet:jakarta.servlet-api:$servletApiVersion"

		// spring-integration-http
		api "com.rometools:rome:$romeToolsVersion"

		// spring-integration-jdbc
		api "org.postgresql:postgresql:$postgresVersion"

		// spring-integration-jms
		api "jakarta.jms:jakarta.jms-api:$jmsApiVersion"

		// spring-integration-jpa
		api "jakarta.persistence:jakarta.persistence-api:$jpaApiVersion"

		// spring-integration-mail
		api "org.eclipse.angus:jakarta.mail:$mailVersion"

		// spring-integration-mongodb
		api "org.mongodb:mongodb-driver-sync:$mongoDriverVersion"
		api "org.mongodb:mongodb-driver-reactivestreams:$mongoDriverVersion"

		// spring-integration-mqtt
		api "org.eclipse.paho:org.eclipse.paho.client.mqttv3:$pahoMqttClientVersion"
		api "org.eclipse.paho:org.eclipse.paho.mqttv5.client:$pahoMqttClientVersion"

		// spring-integration-scripting
		api "org.jetbrains.kotlin:kotlin-scripting-jsr223:$kotlinVersion"
		api "org.graalvm.sdk:graal-sdk:$graalvmVersion"
		api "org.graalvm.polyglot:js:$graalvmVersion"
		api "org.graalvm.polyglot:python:$graalvmVersion"

		// spring-integration-ws
		api "com.sun.xml.bind:jaxb-impl:$jaxbVersion"
	}
}
